services:
  mysql:
    image: mysql:8.4
    container_name: security-example-mysql
    environment:
      MYSQL_DATABASE: appdb
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
#    volumes:
#      - mysql_data:/var/lib/mysql
#      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uapp -papp --silent"]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  mysql_data:
